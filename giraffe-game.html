<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>きりんのアクション 🦒</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 100%);
    font-family: 'Hiragino Maru Gothic ProN', 'Yu Gothic', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    user-select: none;
  }
  h1 {
    color: #fff;
    text-shadow: 2px 2px 0 #FFA500, 4px 4px 0 rgba(0,0,0,0.2);
    margin-bottom: 12px;
    font-size: 28px;
  }
  #gameContainer {
    position: relative;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    border: 4px solid #fff;
    border-radius: 8px;
    overflow: hidden;
  }
  canvas {
    display: block;
    background: linear-gradient(180deg, #87CEEB 0%, #98D8E8 70%, #B5E5C8 100%);
    image-rendering: pixelated;
  }
  #info {
    margin-top: 12px;
    color: #fff;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
    font-size: 14px;
    text-align: center;
    line-height: 1.6;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #overlay.show { opacity: 1; }
  #overlay h2 { font-size: 36px; margin-bottom: 12px; }
  #overlay p { margin-bottom: 8px; }
  .key {
    display: inline-block;
    background: #fff;
    color: #333;
    padding: 2px 8px;
    border-radius: 4px;
    margin: 0 2px;
    font-weight: bold;
    box-shadow: 0 2px 0 #999;
  }
</style>
</head>
<body>
  <h1>🦒 きりんのアクション 🦒</h1>
  <div id="gameContainer">
    <canvas id="game" width="800" height="450"></canvas>
    <div id="overlay"><h2 id="overlayTitle"></h2><p id="overlayText"></p></div>
  </div>
  <div id="info">
    <span class="key">←</span> <span class="key">→</span> 移動 ／ <span class="key">Space</span> ジャンプ ／ <span class="key">R</span> リスタート
    <br>※ 見た目に騙されるな！トラップに注意🪤
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayText = document.getElementById('overlayText');

const TILE = 32;
const GRAVITY = 0.55;
const JUMP_POWER = -12;
const MOVE_SPEED = 3.5;

// 煽り文句リスト
const TAUNTS = [
  ['ｗｗｗｗｗｗｗ', 'え、今の普通避けるでしょwww'],
  ['(￣ー￣)ﾆﾔﾘ', '才能ないって自覚ある〜？'],
  ['(´・ω・｀)', 'まだ序盤なんだけどな〜？'],
  ['ｗ', 'これで何回目？wもう数えてないよｗ'],
  ['┐(´д`)┌', 'はぁ…これは流石に…うん…'],
  ['(*≧艸≦)', '見てるこっちが恥ずかしいんだけどｗ'],
  ['(￣▽￣)', 'もうやめたら？お疲れさま〜♪'],
  ['σ( ̄、 ̄=)', '小学生でもクリアしてたよ？'],
  ['(´▽｀)', 'おっ！また死んだｗ おめでと〜ｗ'],
  ['(￣ー￣)', 'これが…才能の限界ってやつ？'],
  ['(￣∇￣;)', 'ｺﾞｰﾙ見えてた？あれは幻覚だよ'],
  ['(¬‿¬)', 'もしかして初プレイ？(知ってる)'],
  ['ヾ(´∇｀●)ﾉ', '頑張れ〜♪応援だけはしてあげる！'],
  ['(●´ω｀●)', 'リアルでは頑張って！ゲームは無理そう'],
  ['(￣～￣;)', 'キーボードの設定…合ってる？？'],
  ['(ﾉ´∀｀*)', '生きてるだけで偉い！ゲームでは死んだけど'],
  ['(´._.`)', 'もう諦めてお散歩でも行こ？'],
  ['＼(^o^)／', '画面割らないでね？経済的にｗ'],
  ['( ´_ゝ`)', 'これ配信したら伸びそうｗ(悪い意味で)'],
  ['(￣ヘ￣;)', '下手すぎて逆に才能あるかも〜？'],
  ['(*´∀｀*)', '次こそは…って何回目だっけ？ｗ'],
  ['(  ◜ω◝  )', 'うんうん、その調子で死に続けて♡'],
  ['(￣д￣;)', '見てて辛い…代わりにやろうか？'],
  ['ヽ( ´∇｀)ﾉ', 'ｷﾘﾝもびっくりしてるよｗ ｗｗｗ'],
  ['(  ﾟдﾟ)', 'え、今の無理ゲーじゃなくない？'],
  ['(￣m￣〃)', 'ﾌﾌｯ…なんでもないｗ続けてｗ'],
  ['(；´∀｀)', 'いや〜〜〜下手っぴすぎてｗ尊敬するわｗ'],
  ['( ｰ̀εｰ́ )', 'もっとマシなプレイ見せてくれない？'],
  ['(*ﾟーﾟ)', 'はい、おかえり〜w また来たねw'],
  ['(￣艸￣*)', 'これゲーム下手選手権あったら優勝だよ'],
];

// ======== ステージデータ ========
// .=空, #=地面, B=ブロック, ?=偽ブロック(触ると消える), F=落下足場
// C=偽コイン(死亡), G=ゴール, S=スパイク, H=隠しブロック(ジャンプを阻む)
// E=敵（カラス的なもの・接触で死亡）, K=本物コイン
const levelStr = `
................................................................................................
................................................................................................
.........H...........HH..........H............HH..........H...........H..........H.............
............?...H........?....H........?...HH........?....H.........?....H.........?......H....
................................................................................................
......CCC........BBB......KCK........BBB....CCC........BBB.....KCKCK......BBB.....CCK.......K..
................................................................................................
......BBB........FFF......BBB........FFF....BBB........FFF......BBB.....FFF.......BBB.........G
................................................................................................
.................................................................................................
.............E........E.......E.......E......E.......E.......E......E.......E....E............
###########..####.####..######..######....##.####..######..######.####.######..######.#########
###########..####.####..######..######....##.####..######..######.####.######..######.#########
............SSSS....SSSS......SSSS....SSSSSS....SSSS......SSSS....SSSS......SSSS......SS........
`.trim();

const levelRows = levelStr.split('\n');
const LEVEL_H = levelRows.length;
const LEVEL_W = levelRows[0].length;

let player, camera, particles, deathTimer, deathState, keys, won, hiddenRevealed, fallingTriggered, takenItems, deathCount, lastTauntIdx;

function reset() {
  player = {
    x: 64, y: 200,
    vx: 0, vy: 0,
    w: 22, h: 30,
    onGround: false,
    facing: 1,
    walkFrame: 0,
    alive: true,
    jumpsLeft: 2,
  };
  camera = { x: 0, y: 0 };
  particles = [];
  deathTimer = 0;
  deathState = null;
  hiddenRevealed = new Set();
  fallingTriggered = new Map();
  takenItems = new Set();
  won = false;
  overlay.classList.remove('show');
  overlay.style.background = '';
}
if (typeof deathCount === 'undefined') { deathCount = 0; lastTauntIdx = -1; }

const keyState = {};
let jumpPressed = false;
window.addEventListener('keydown', e => {
  if (!keyState[e.key]) {
    if (e.key === ' ' || e.key === 'ArrowUp') jumpPressed = true;
  }
  keyState[e.key] = true;
  if (e.key === ' ') e.preventDefault();
  if (e.key.toLowerCase() === 'r') reset();
});
window.addEventListener('keyup', e => { keyState[e.key] = false; });

// ======== 当たり判定 ========
function getTile(tx, ty) {
  if (ty < 0 || ty >= LEVEL_H || tx < 0 || tx >= LEVEL_W) return '.';
  return levelRows[ty][tx];
}

function isSolid(tx, ty) {
  const c = getTile(tx, ty);
  if (c === '#' || c === 'B') return true;
  if (c === 'H' && hiddenRevealed.has(`${tx},${ty}`)) return true;
  if (c === 'F') {
    const trig = fallingTriggered.get(`${tx},${ty}`);
    if (!trig) return true;
    if (trig.fallen) return false;
    return true;
  }
  return false;
}

function isLethal(tx, ty) {
  const c = getTile(tx, ty);
  return c === 'S';
}

// ======== プレイヤー更新 ========
function updatePlayer() {
  if (!player.alive) {
    deathTimer++;
    player.vy += 0.4;
    player.x += deathState.vx;
    player.y += player.vy;
    if (deathTimer === 91) showTaunt();
    return;
  }
  if (won) return;

  // 入力
  let move = 0;
  if (keyState['ArrowLeft']) move -= 1;
  if (keyState['ArrowRight']) move += 1;
  player.vx = move * MOVE_SPEED;
  if (move !== 0) {
    player.facing = move;
    player.walkFrame += 0.2;
  }

  // ジャンプ（二段ジャンプ対応）
  if (jumpPressed && player.jumpsLeft > 0) {
    player.vy = JUMP_POWER;
    player.onGround = false;
    // 二段目はキラキラエフェクト
    if (player.jumpsLeft === 1) {
      for (let i = 0; i < 10; i++) {
        const angle = (Math.PI * 2 * i) / 10;
        particles.push({
          x: player.x + player.w/2,
          y: player.y + player.h,
          vx: Math.cos(angle) * 2.5,
          vy: Math.sin(angle) * 2.5 + 1,
          life: 25,
          color: ['#FFD700','#FFFACD','#FFB6C1','#87CEFA'][i % 4]
        });
      }
    }
    player.jumpsLeft--;
  }
  jumpPressed = false;

  // 重力
  player.vy += GRAVITY;
  if (player.vy > 14) player.vy = 14;

  // X方向移動と衝突
  player.x += player.vx;
  resolveCollisionX();

  // Y方向移動と衝突
  player.y += player.vy;
  player.onGround = false;
  resolveCollisionY();

  // 落下死
  if (player.y > H + 200) die(0);

  // タイル相互作用
  checkTileInteractions();

  // ゴール
  for (let ty = 0; ty < LEVEL_H; ty++) {
    for (let tx = 0; tx < LEVEL_W; tx++) {
      if (getTile(tx, ty) === 'G') {
        if (rectVsTile(player, tx, ty)) {
          won = true;
          overlayTitle.textContent = '🎉 クリア！ 🎉';
          overlayText.textContent = 'やったね！Rキーでもう一度';
          overlay.classList.add('show');
        }
      }
    }
  }

  // 落下足場の経過
  fallingTriggered.forEach((v, k) => {
    if (!v.fallen) {
      v.timer++;
      if (v.timer > 25) v.fallen = true;
    }
  });
}

function rectVsTile(p, tx, ty) {
  const tileRect = { x: tx*TILE, y: ty*TILE, w: TILE, h: TILE };
  return p.x < tileRect.x + tileRect.w &&
         p.x + p.w > tileRect.x &&
         p.y < tileRect.y + tileRect.h &&
         p.y + p.h > tileRect.y;
}

function resolveCollisionX() {
  const minTX = Math.floor(player.x / TILE) - 1;
  const maxTX = Math.floor((player.x + player.w) / TILE) + 1;
  const minTY = Math.floor(player.y / TILE) - 1;
  const maxTY = Math.floor((player.y + player.h) / TILE) + 1;
  for (let ty = minTY; ty <= maxTY; ty++) {
    for (let tx = minTX; tx <= maxTX; tx++) {
      if (!isSolid(tx, ty)) continue;
      if (rectVsTile(player, tx, ty)) {
        if (player.vx > 0) player.x = tx*TILE - player.w;
        else if (player.vx < 0) player.x = tx*TILE + TILE;
        player.vx = 0;
      }
    }
  }
}

function resolveCollisionY() {
  const minTX = Math.floor(player.x / TILE) - 1;
  const maxTX = Math.floor((player.x + player.w) / TILE) + 1;
  const minTY = Math.floor(player.y / TILE) - 1;
  const maxTY = Math.floor((player.y + player.h) / TILE) + 1;
  for (let ty = minTY; ty <= maxTY; ty++) {
    for (let tx = minTX; tx <= maxTX; tx++) {
      if (!isSolid(tx, ty)) continue;
      if (rectVsTile(player, tx, ty)) {
        if (player.vy > 0) {
          player.y = ty*TILE - player.h;
          player.vy = 0;
          player.onGround = true;
          player.jumpsLeft = 2;
          // 落下足場トリガー
          if (getTile(tx, ty) === 'F') {
            const k = `${tx},${ty}`;
            if (!fallingTriggered.has(k)) fallingTriggered.set(k, { timer: 0, fallen: false });
          }
        } else if (player.vy < 0) {
          player.y = ty*TILE + TILE;
          player.vy = 0;
          // 隠しブロック発動（下から叩く）
          if (getTile(tx, ty) === 'H') {
            hiddenRevealed.add(`${tx},${ty}`);
          }
        }
      }
    }
  }
}

function checkTileInteractions() {
  const minTX = Math.floor(player.x / TILE);
  const maxTX = Math.floor((player.x + player.w) / TILE);
  const minTY = Math.floor(player.y / TILE);
  const maxTY = Math.floor((player.y + player.h) / TILE);
  for (let ty = minTY; ty <= maxTY; ty++) {
    for (let tx = minTX; tx <= maxTX; tx++) {
      const c = getTile(tx, ty);
      if (!c || c === '.') continue;
      if (!rectVsTile(player, tx, ty)) continue;

      if (isLethal(tx, ty)) {
        die(player.vx * 0.3);
        return;
      }
      // 偽コイン
      if (c === 'C' && !takenItems.has(`${tx},${ty}`)) {
        takenItems.add(`${tx},${ty}`);
        die(0);
        return;
      }
      // 偽ブロック ?
      if (c === '?' && !takenItems.has(`${tx},${ty}`)) {
        takenItems.add(`${tx},${ty}`);
        // 上に弾き飛ばし
        for (let i = 0; i < 12; i++) {
          particles.push({
            x: tx*TILE+16, y: ty*TILE+16,
            vx: (Math.random()-0.5)*4,
            vy: -Math.random()*5-2,
            life: 30, color: '#FFD700'
          });
        }
        die(player.vx * 0.3);
        return;
      }
      // 本物コイン
      if (c === 'K' && !takenItems.has(`${tx},${ty}`)) {
        takenItems.add(`${tx},${ty}`);
        for (let i = 0; i < 8; i++) {
          particles.push({
            x: tx*TILE+16, y: ty*TILE+16,
            vx: (Math.random()-0.5)*3,
            vy: -Math.random()*3-1,
            life: 25, color: '#FFFF99'
          });
        }
      }
      // 敵
      if (c === 'E') {
        die(player.vx * 0.3);
        return;
      }
    }
  }
}

function showTaunt() {
  deathCount++;
  // 連続で同じのが出ないようにする
  let idx;
  do {
    idx = Math.floor(Math.random() * TAUNTS.length);
  } while (idx === lastTauntIdx && TAUNTS.length > 1);
  lastTauntIdx = idx;
  const [title, msg] = TAUNTS[idx];

  // 何回死んでも煽る用のサブメッセージ
  let counterMsg = '';
  if (deathCount === 1) counterMsg = `初の犠牲者… 合掌🙏`;
  else if (deathCount < 5) counterMsg = `これで ${deathCount} 回目ｗ`;
  else if (deathCount < 10) counterMsg = `${deathCount}回死亡…さすがにそろそろ慣れた？`;
  else if (deathCount < 20) counterMsg = `ｴｯ ${deathCount}回!? もうやめて〜w`;
  else if (deathCount < 30) counterMsg = `${deathCount}回……記録更新中ｗ`;
  else counterMsg = `${deathCount}回目wwwもう殿堂入りですwww`;

  overlayTitle.textContent = title;
  overlayText.innerHTML = `${msg}<br><span style="font-size:14px;opacity:.85">${counterMsg}</span><br><span style="font-size:13px;opacity:.7;margin-top:8px;display:inline-block">[R] でリトライ</span>`;

  // ランダムな背景色（赤系・紫系・青系・黄系）
  const tints = [
    'rgba(180,30,30,0.55)',
    'rgba(80,30,120,0.55)',
    'rgba(20,40,100,0.55)',
    'rgba(160,100,20,0.55)',
    'rgba(30,120,30,0.55)',
    'rgba(0,0,0,0.6)',
  ];
  overlay.style.background = tints[Math.floor(Math.random()*tints.length)];

  overlay.classList.add('show');

  // 煽り絵文字を画面に降らせる
  const rainEmojis = ['💀','🤣','😂','💩','🥱','👎','🙄','😏','🤡','🪦'];
  const emoji = rainEmojis[Math.floor(Math.random()*rainEmojis.length)];
  for (let i = 0; i < 18; i++) {
    particles.push({
      x: camera.x + Math.random() * W,
      y: -20 - Math.random()*100,
      vx: (Math.random()-0.5)*1.5,
      vy: 1 + Math.random()*2,
      life: 200,
      color: emoji,
      isEmoji: true,
      size: 16 + Math.random()*16,
    });
  }
}

function die(vx) {
  if (!player.alive) return;
  player.alive = false;
  player.vy = -10;
  deathState = { vx: vx };
  // 死亡パーティクル
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: player.x+player.w/2, y: player.y+player.h/2,
      vx: (Math.random()-0.5)*6,
      vy: -Math.random()*4-2,
      life: 40, color: '#fff'
    });
  }
}

// ======== 描画 ========
function drawGiraffe(x, y, facing, walkFrame, dead) {
  ctx.save();
  ctx.translate(x + 11, y + 15);
  if (dead) {
    ctx.rotate(deathTimer * 0.15);
  } else {
    ctx.scale(facing, 1);
  }

  // ピクセルアート風きりん（プラッシー風）
  // 色
  const Y = '#FFD639'; // 黄色
  const D = '#E8B820'; // 影黄
  const B = '#1a1a1a'; // 黒（斑点・目）
  const W = '#FFFFFF'; // 白（角先）
  const P = '#FFC0CB'; // ほっぺ

  const px = 2; // ピクセルサイズ
  function p(gx, gy, c) {
    ctx.fillStyle = c;
    ctx.fillRect((gx-6)*px, (gy-15)*px, px, px);
  }

  // スプライト 12x30 程度
  const sprite = [
    "....WW.WW...",  // 0 角の先（白）
    "....WW.WW...",  // 1
    "....YY.YY...",  // 2 角の根
    "...YYYYYY...",  // 3 頭頂
    "..YYYYYYYY..",  // 4 頭
    "..YYBYYYBY..",  // 5 目
    "..YYYYYYYY..",  // 6
    "...YYYYYY...",  // 7 頭下
    "....YY......",  // 8 首
    "....YY......",  // 9
    "...YYY......",  // 10
    "...YYY......",  // 11
    "..YYYY......",  // 12
    "..YYYY......",  // 13
    ".YYYYYY.....",  // 14 肩
    "YYYYYYYYY...",  // 15 胴体
    "YYBYYYYBYY..",  // 16 斑点
    "YYYYYYYYYY..",  // 17
    "YYYYBYYYYY..",  // 18 斑点
    "YYYYYYYYYY..",  // 19
    "YYBYYYYYYY..",  // 20 斑点
    "YYYYYYYBYY..",  // 21 斑点
    "YYYYYYYYY...",  // 22 胴下
    "YY..YY..YY..",  // 23 脚分岐
    "YY..YY..YY..",  // 24 脚
    "YY..YY..YY..",  // 25
    "YY..YY..YY..",  // 26
    "BB..BB..BB..",  // 27 ひづめ
  ];

  // 歩行アニメ：脚部分のオフセット
  const legPhase = Math.floor(walkFrame) % 2;

  for (let row = 0; row < sprite.length; row++) {
    for (let col = 0; col < sprite[row].length; col++) {
      const ch = sprite[row][col];
      let color = null;
      if (ch === 'Y') color = Y;
      else if (ch === 'B') color = B;
      else if (ch === 'W') color = W;
      if (!color) continue;

      // 脚の歩行アニメ（row 23-27 で legPhase によってずらす）
      let drawY = row;
      if (row >= 23 && !dead) {
        // 前後の脚を交互に
        const isLeftLeg = col <= 3;
        const isMidLeg = col >= 4 && col <= 6;
        const isRightLeg = col >= 8;
        if (legPhase === 0 && (isLeftLeg || isRightLeg)) drawY -= 1;
        if (legPhase === 1 && isMidLeg) drawY -= 1;
      }

      ctx.fillStyle = color;
      ctx.fillRect((col-5)*px, (drawY-15)*px, px, px);
    }
  }

  // ほっぺ（生きてる時だけ）
  if (!dead) {
    ctx.fillStyle = P;
    ctx.fillRect(((-1))*px, (5-15)*px, px*2, px);
  }

  // 死亡時の口
  if (dead) {
    ctx.fillStyle = B;
    ctx.fillRect((-2)*px, (4-15)*px, px*4, px);
    ctx.fillRect((-1)*px, (5-15)*px, px*2, px);
  }

  ctx.restore();
}

function drawTile(tx, ty) {
  const c = getTile(tx, ty);
  const x = tx * TILE, y = ty * TILE;
  switch (c) {
    case '#':
      // 地面（草付き）
      ctx.fillStyle = '#8B5A2B';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#7AC74F';
      ctx.fillRect(x, y, TILE, 6);
      ctx.fillStyle = '#6B3410';
      for (let i = 0; i < 3; i++) {
        ctx.fillRect(x + 4 + i*10, y + 12 + (i%2)*8, 4, 4);
      }
      break;
    case 'B':
      // 普通のブロック
      ctx.fillStyle = '#C97B3F';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#A05A20';
      ctx.fillRect(x, y, TILE, 4);
      ctx.fillRect(x, y+TILE-4, TILE, 4);
      ctx.fillRect(x, y, 4, TILE);
      ctx.fillRect(x+TILE-4, y, 4, TILE);
      ctx.fillStyle = '#FFE4B5';
      ctx.fillRect(x+4, y+4, 4, 4);
      break;
    case '?':
      if (!takenItems.has(`${tx},${ty}`)) {
        // 偽ブロック（怪しい？）
        const pulse = Math.sin(Date.now()/200) * 2;
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#B8860B';
        ctx.fillRect(x, y, TILE, 3);
        ctx.fillRect(x, y+TILE-3, TILE, 3);
        ctx.fillRect(x, y, 3, TILE);
        ctx.fillRect(x+TILE-3, y, 3, TILE);
        ctx.fillStyle = '#000';
        ctx.font = 'bold 20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('?', x+TILE/2, y+TILE/2+7+pulse);
      }
      break;
    case 'F':
      // 落下足場
      const trig = fallingTriggered.get(`${tx},${ty}`);
      if (!trig || !trig.fallen) {
        const shake = trig ? (Math.random()-0.5)*3 : 0;
        ctx.fillStyle = '#A8A8A8';
        ctx.fillRect(x+shake, y, TILE, TILE);
        ctx.fillStyle = '#777';
        ctx.fillRect(x+shake, y, TILE, 4);
        ctx.fillRect(x+shake, y+TILE-4, TILE, 4);
        ctx.fillStyle = '#555';
        ctx.fillRect(x+8+shake, y+10, 4, 4);
        ctx.fillRect(x+20+shake, y+18, 4, 4);
      }
      break;
    case 'C':
      if (!takenItems.has(`${tx},${ty}`)) {
        // 偽コイン（普通のコインに見える）
        const bob = Math.sin(Date.now()/300 + tx) * 3;
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(x+TILE/2, y+TILE/2+bob, 10, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = '#B8860B';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#FFFACD';
        ctx.fillRect(x+TILE/2-1, y+TILE/2-5+bob, 2, 10);
      }
      break;
    case 'K':
      if (!takenItems.has(`${tx},${ty}`)) {
        // 本物コイン（ハート）
        const bob = Math.sin(Date.now()/250 + tx) * 3;
        ctx.fillStyle = '#FF6B9D';
        ctx.beginPath();
        ctx.arc(x+TILE/2-4, y+TILE/2+bob, 5, 0, Math.PI*2);
        ctx.arc(x+TILE/2+4, y+TILE/2+bob, 5, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(x+TILE/2-9, y+TILE/2+bob);
        ctx.lineTo(x+TILE/2+9, y+TILE/2+bob);
        ctx.lineTo(x+TILE/2, y+TILE/2+12+bob);
        ctx.fill();
      }
      break;
    case 'S':
      // スパイク
      ctx.fillStyle = '#999';
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(x+i*8, y+TILE);
        ctx.lineTo(x+i*8+4, y+TILE-12);
        ctx.lineTo(x+i*8+8, y+TILE);
        ctx.fill();
      }
      ctx.fillStyle = '#666';
      ctx.fillRect(x, y+TILE-3, TILE, 3);
      break;
    case 'H':
      if (hiddenRevealed.has(`${tx},${ty}`)) {
        ctx.fillStyle = '#C97B3F';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#A05A20';
        ctx.fillRect(x, y, TILE, 4);
        ctx.fillRect(x, y+TILE-4, TILE, 4);
      }
      // 隠しブロックは通常時は見えない！
      break;
    case 'E':
      // 敵：黒いカラスっぽいやつ
      const fly = Math.sin(Date.now()/200 + tx) * 4;
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.ellipse(x+TILE/2, y+TILE/2+fly, 12, 8, 0, 0, Math.PI*2);
      ctx.fill();
      // 翼
      const wing = Math.sin(Date.now()/100) * 3;
      ctx.beginPath();
      ctx.ellipse(x+TILE/2-8, y+TILE/2+fly+wing, 6, 3, 0.3, 0, Math.PI*2);
      ctx.ellipse(x+TILE/2+8, y+TILE/2+fly+wing, 6, 3, -0.3, 0, Math.PI*2);
      ctx.fill();
      // くちばし
      ctx.fillStyle = '#FFA500';
      ctx.beginPath();
      ctx.moveTo(x+TILE/2+10, y+TILE/2+fly);
      ctx.lineTo(x+TILE/2+16, y+TILE/2+fly-2);
      ctx.lineTo(x+TILE/2+10, y+TILE/2+fly+2);
      ctx.fill();
      // 目
      ctx.fillStyle = '#fff';
      ctx.fillRect(x+TILE/2+4, y+TILE/2+fly-3, 3, 3);
      ctx.fillStyle = '#000';
      ctx.fillRect(x+TILE/2+5, y+TILE/2+fly-2, 2, 2);
      break;
    case 'G':
      // ゴール（旗）
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(x+TILE/2-2, y, 4, TILE);
      ctx.fillStyle = '#FF1493';
      ctx.beginPath();
      ctx.moveTo(x+TILE/2+2, y+4);
      ctx.lineTo(x+TILE/2+22, y+12);
      ctx.lineTo(x+TILE/2+2, y+20);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px sans-serif';
      ctx.fillText('G', x+TILE/2+8, y+15);
      break;
  }
}

function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  const drift = (Date.now()/100) % (LEVEL_W*TILE);
  for (let i = 0; i < 6; i++) {
    const cx = (i*250 - drift*0.3 - camera.x*0.3) % (LEVEL_W*TILE+200);
    const cy = 40 + (i%2)*30;
    ctx.beginPath();
    ctx.arc(cx, cy, 18, 0, Math.PI*2);
    ctx.arc(cx+18, cy-4, 16, 0, Math.PI*2);
    ctx.arc(cx+34, cy, 18, 0, Math.PI*2);
    ctx.arc(cx+18, cy+8, 14, 0, Math.PI*2);
    ctx.fill();
  }
}

function render() {
  // 背景
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(0.7, '#B5E5C8');
  grad.addColorStop(1, '#9DD89E');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  drawClouds();

  // カメラ
  const targetCamX = Math.max(0, Math.min(player.x - W/3, LEVEL_W*TILE - W));
  camera.x += (targetCamX - camera.x) * 0.12;

  ctx.save();
  ctx.translate(-camera.x, -camera.y);

  // タイル描画
  const startTX = Math.max(0, Math.floor(camera.x/TILE));
  const endTX = Math.min(LEVEL_W, Math.ceil((camera.x+W)/TILE)+1);
  for (let ty = 0; ty < LEVEL_H; ty++) {
    for (let tx = startTX; tx < endTX; tx++) {
      drawTile(tx, ty);
    }
  }

  // パーティクル
  particles.forEach(p => {
    if (p.isEmoji) {
      ctx.globalAlpha = Math.max(0, Math.min(1, p.life/100));
      ctx.font = `${p.size}px sans-serif`;
      ctx.fillText(p.color, p.x, p.y);
    } else {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.life/40);
      ctx.fillRect(p.x-2, p.y-2, 4, 4);
    }
  });
  ctx.globalAlpha = 1;

  // プレイヤー
  drawGiraffe(player.x, player.y, player.facing, player.walkFrame, !player.alive);

  ctx.restore();
}

function updateParticles() {
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (!p.isEmoji) p.vy += 0.3;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);
}

function loop() {
  updatePlayer();
  updateParticles();
  render();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>
</body>
</html>

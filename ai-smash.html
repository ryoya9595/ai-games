<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AIツール大乱闘 〜きりん参戦〜 🥊🦒</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    font-family: 'Hiragino Maru Gothic ProN', 'Yu Gothic', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    user-select: none;
    color: #fff;
  }
  h1 {
    font-size: 28px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #ff5e5e, #ffaa00, #5effae, #5eaaff, #c45eff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 12px rgba(255,255,255,0.15);
  }
  #gameContainer {
    position: relative;
    border: 4px solid #fff;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(255,100,200,0.4);
    overflow: hidden;
  }
  canvas { display: block; background: #1a1a2e; image-rendering: pixelated; }
  #info {
    margin-top: 12px;
    color: #aaa;
    font-size: 13px;
    text-align: center;
    line-height: 1.7;
  }
  .key {
    display: inline-block;
    background: #fff;
    color: #222;
    padding: 1px 7px;
    border-radius: 4px;
    margin: 0 2px;
    font-weight: bold;
    box-shadow: 0 2px 0 #999;
    font-size: 12px;
  }
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    text-align: center;
    transition: opacity 0.3s;
    overflow-y: auto;
    padding: 16px 12px 24px;
  }
  #overlay::-webkit-scrollbar { width: 8px; }
  #overlay::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
  #overlay.hide { opacity: 0; pointer-events: none; }
  #overlay h2 { font-size: 24px; margin: 4px 0 8px; }
  #overlaySub { font-size: 12px; opacity: 0.85; }
  .modeSelect { display: flex; gap: 20px; margin: 20px 0; }
  .modeBtn {
    padding: 22px 32px;
    background: rgba(255,255,255,0.08);
    border: 3px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    color: #fff;
    font-family: inherit;
  }
  .modeBtn:hover { transform: translateY(-3px); background: rgba(255,255,255,0.18); border-color: #ffe76a; }
  .modeBtn .ico { font-size: 38px; display:block; margin-bottom:6px; }
  .modeBtn .ttl { font-size: 17px; font-weight: bold; margin-bottom: 4px; }
  .modeBtn .sub { font-size: 11px; opacity: 0.7; }
  .levelSelect {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 4px;
    margin: 6px auto 4px;
    max-width: 460px;
  }
  .levelBtn {
    padding: 6px 0;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 6px;
    cursor: pointer;
    color: #fff;
    font-weight: bold;
    font-family: inherit;
    transition: all 0.1s;
  }
  .levelBtn:hover { background: rgba(255,255,255,0.2); }
  .levelBtn.selected { border-color: #ffe76a; background: rgba(255,231,106,0.25); }
  .levelLabel { font-size: 12px; opacity: 0.7; margin-bottom: 6px; }
  .charSelect {
    display: flex; gap: 8px; margin: 8px 0;
    flex-wrap: wrap; justify-content: center; max-width: 820px;
  }
  .charCard {
    width: 100px;
    padding: 8px 6px;
    background: rgba(255,255,255,0.08);
    border: 3px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .charCard:hover {
    transform: translateY(-4px);
    background: rgba(255,255,255,0.18);
    border-color: #ffe76a;
  }
  .charCard .emoji { font-size: 30px; display: block; margin-bottom: 2px; }
  .charCard .name { font-size: 12px; font-weight: bold; margin-bottom: 2px; }
  .charCard .desc { font-size: 9px; opacity: 0.7; line-height: 1.3; }
  .charCard.selectedPlayer { border-color: #ffe76a !important; background: rgba(255,231,106,0.15); box-shadow: 0 0 16px rgba(255,231,106,0.4); }
  .charCard.selectedCPU { border-color: #5eaaff !important; background: rgba(94,170,255,0.12); }
  .charCard .badge {
    position: absolute; top: 4px; right: 6px;
    font-size: 10px; font-weight: bold;
    padding: 2px 6px; border-radius: 4px;
  }
  .charCard { position: relative; }
  .stepLabel {
    margin: 8px auto 4px;
    font-size: 13px;
    opacity: 0.9;
    font-weight: bold;
  }
  .stepLabel .num {
    display:inline-block; background:#fff; color:#222;
    border-radius:50%; width:22px; height:22px; line-height:22px;
    text-align:center; margin-right:6px; font-size:12px;
  }
  .cpuSlots {
    display: flex; gap: 8px; justify-content: center;
    margin: 6px 0 2px;
  }
  .cpuSlot {
    width: 80px; height: 60px;
    border: 2px dashed rgba(255,255,255,0.3);
    border-radius: 8px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(255,255,255,0.04);
    font-size: 11px; opacity: 0.85;
    position: relative;
  }
  .cpuSlot.filled { border-style: solid; border-color: #5eaaff; background: rgba(94,170,255,0.1); }
  .cpuSlot .emoji { font-size: 22px; line-height: 1; }
  .cpuSlot .name { font-size: 9px; }
  .cpuSlot .clear {
    position: absolute; top: 2px; right: 4px;
    font-size: 12px; cursor: pointer; opacity: 0.6;
  }
  .cpuSlot .clear:hover { opacity: 1; }
  .actionRow { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
  .actionRow button {
    padding: 8px 16px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    color: #fff; cursor: pointer; font-family: inherit;
    font-size: 13px;
  }
  .actionRow button:hover { background: rgba(255,255,255,0.2); }
  .actionRow button.primary {
    background: linear-gradient(90deg, #ff5e5e, #ffaa00);
    border: none; font-weight: bold;
    box-shadow: 0 3px 0 rgba(0,0,0,0.3);
  }
  .actionRow button.primary:disabled {
    opacity: 0.4; cursor: not-allowed; box-shadow: none;
  }
  .startHint { font-size: 13px; opacity: 0.6; margin-top: 12px; }
  #resultBtn {
    margin-top: 20px;
    background: linear-gradient(90deg, #ff5e5e, #ffaa00);
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.3);
  }
  #resultBtn:hover { transform: translateY(-2px); }
</style>
</head>
<body>
  <h1>🥊 AIツール大乱闘 〜きりん参戦〜 🦒</h1>
  <div id="gameContainer">
    <canvas id="game" width="900" height="500"></canvas>
    <div id="overlay">
      <h2 id="overlayTitle">モード選択</h2>
      <div id="overlaySub">どっちで遊ぶ？</div>
      <div class="modeSelect" id="modeSelect">
        <button class="modeBtn" data-mode="battle"><span class="ico">⚔️</span><div class="ttl">バトル</div><div class="sub">CPU3体と乱闘</div></button>
        <button class="modeBtn" data-mode="training"><span class="ico">🥋</span><div class="ttl">トレーニング</div><div class="sub">操作を練習</div></button>
      </div>
      <div id="levelArea" style="display:none">
        <div class="levelLabel">CPUレベル（弱 ← → 強）</div>
        <div class="levelSelect" id="levelSelect"></div>
        <div style="font-size:12px;opacity:.7;margin-top:8px" id="levelDesc">Lv.5：標準</div>
      </div>
      <div id="selectArea" style="display:none">
        <div class="stepLabel" id="stepLabel"><span class="num">1</span>あなたのキャラを選んでね</div>
        <div class="charSelect" id="charSelect"></div>
        <div id="cpuPickArea" style="display:none">
          <div class="stepLabel"><span class="num">2</span>CPU3体を選んでね（クリックで追加 / 同じキャラOK）</div>
          <div class="cpuSlots" id="cpuSlots"></div>
        </div>
        <div class="actionRow" id="actionRow" style="display:none">
          <button id="randomBtn">🎲 ランダム</button>
          <button id="clearBtn">クリア</button>
          <button id="startBtn" class="primary" disabled>▶ 試合開始</button>
        </div>
      </div>
      <div class="startHint" id="startHint" style="display:none"></div>
      <button id="backBtn" style="display:none;margin-top:14px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:6px 14px;border-radius:6px;cursor:pointer;font-family:inherit">← 戻る</button>
      <div id="resultBtns" style="display:none;margin-top:8px">
        <button id="resultBtn" style="background:linear-gradient(90deg,#ff5e5e,#ffaa00);color:#fff;border:none;padding:12px 22px;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,0.3);font-family:inherit;margin-right:8px">もう一度戦う</button>
        <button id="homeBtn" style="background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:12px 18px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit">🏠 ホームに戻る</button>
      </div>
    </div>
  </div>
  <div id="info">
    <span class="key">←</span> <span class="key">→</span> 移動 ／
    <span class="key">↑</span> or <span class="key">Space</span> ジャンプ（2段可） ／
    <span class="key">A</span> 通常 ／ <span class="key">S</span> スマッシュ ／ <span class="key">D</span> 必殺技
    <br><span class="key">F</span> ガード（押しっぱ） ／ <span class="key">G</span> 掴み
    <br>掴み中： <span class="key">A</span> 前投げ ／ <span class="key">S</span> 後ろ投げ ／ <span class="key">D</span> 上投げ ／ <span class="key">↓</span> 下投げ
    <br>ダメージ%が高いほど吹っ飛ぶ！崖から落ちたらストック減。3体倒したら勝ち🏆
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');
const charSelectEl = document.getElementById('charSelect');
const startHint = document.getElementById('startHint');
const resultBtn = document.getElementById('resultBtn');
const modeSelectEl = document.getElementById('modeSelect');
const levelArea = document.getElementById('levelArea');
const levelSelectEl = document.getElementById('levelSelect');
const levelDesc = document.getElementById('levelDesc');
const backBtn = document.getElementById('backBtn');
const selectArea = document.getElementById('selectArea');
const stepLabel = document.getElementById('stepLabel');
const cpuPickArea = document.getElementById('cpuPickArea');
const cpuSlotsEl = document.getElementById('cpuSlots');
const actionRow = document.getElementById('actionRow');
const randomBtn = document.getElementById('randomBtn');
const clearBtn = document.getElementById('clearBtn');
const startBtn = document.getElementById('startBtn');
const resultBtns = document.getElementById('resultBtns');
const homeBtn = document.getElementById('homeBtn');

let pickedPlayer = -1;     // プレイヤーが選んだキャラのインデックス（-1=未選択）
let pickedCPUs = [];       // CPU3体のインデックス配列

let selectedMode = 'battle'; // 'battle' or 'training'
let selectedLevel = 5;
const LEVEL_DESC = {
  1: 'Lv.1：超弱い（ほぼ動かない）',
  2: 'Lv.2：かなり弱い',
  3: 'Lv.3：弱め',
  4: 'Lv.4：少し弱い',
  5: 'Lv.5：標準',
  6: 'Lv.6：少し強い',
  7: 'Lv.7：強め',
  8: 'Lv.8：かなり強い',
  9: 'Lv.9：鬼神',
};
function getLevelParams(lv) {
  // 反応速度・攻撃頻度・ガード頻度・読みの精度
  const t = (lv - 1) / 8; // 0〜1
  return {
    aiTickMin: Math.round(60 - t*45),     // 行動更新間隔の最小
    aiTickRand: Math.round(60 - t*40),    // ランダム幅
    attackChance: 0.01 + t*0.10,          // 攻撃発動率/F
    guardChance: 0.05 + t*0.45,           // 危険時のガード率
    grabChance: 0.05 + t*0.20,            // 掴み判断率
    approachBias: 0.55 + t*0.30,          // 接近行動率
    smashRatio: 0.20 + t*0.30,            // スマッシュ割合
    moveSpeedScale: 0.60 + t*0.55,        // 移動加速倍率
    recoverySkill: 0.30 + t*0.65,         // 復帰スキル
    punishChance: t*0.6,                  // ガード解け際の反確
  };
}

// モード選択
modeSelectEl.querySelectorAll('.modeBtn').forEach(btn => {
  btn.onclick = () => {
    selectedMode = btn.dataset.mode;
    showCharSelect();
  };
});

function showModeSelect() {
  gameState = 'select';
  bossEntryTimer = 0;
  overlayTitle.textContent = 'モード選択';
  overlaySub.textContent = 'どっちで遊ぶ？';
  modeSelectEl.style.display = 'flex';
  levelArea.style.display = 'none';
  selectArea.style.display = 'none';
  startHint.style.display = 'none';
  backBtn.style.display = 'none';
  resultBtns.style.display = 'none';
  overlay.classList.remove('hide');
}

function showCharSelect() {
  overlayTitle.textContent = selectedMode === 'training' ? '🥋 トレーニング' : '⚔️ バトル';
  overlaySub.textContent = selectedMode === 'training' ? 'サンドバッグ用CPUの強さとキャラを選択' : 'CPUレベルとキャラを選択';
  modeSelectEl.style.display = 'none';
  levelArea.style.display = 'block';
  selectArea.style.display = 'block';
  startHint.style.display = 'none';
  backBtn.style.display = 'inline-block';
  // 状態リセット
  pickedPlayer = -1;
  pickedCPUs = [];
  if (selectedMode === 'training') {
    cpuPickArea.style.display = 'none';
    actionRow.style.display = 'none';
  } else {
    cpuPickArea.style.display = 'block';
    actionRow.style.display = 'flex';
  }
  renderLevelSelect();
  renderCharSelect();
  renderCpuSlots();
  updateStartBtn();
}

backBtn.onclick = () => showModeSelect();

function renderLevelSelect() {
  levelSelectEl.innerHTML = '';
  for (let lv = 1; lv <= 9; lv++) {
    const b = document.createElement('button');
    b.className = 'levelBtn' + (lv === selectedLevel ? ' selected' : '');
    b.textContent = lv;
    b.onclick = () => {
      selectedLevel = lv;
      renderLevelSelect();
      levelDesc.textContent = LEVEL_DESC[lv];
    };
    levelSelectEl.appendChild(b);
  }
  levelDesc.textContent = LEVEL_DESC[selectedLevel];
}

// ======== キャラ定義 ========
const CHARS = [
  {
    id: 'giraffe', name: 'きりん', emoji: '🦒',
    color: '#FFD639', accent: '#1a1a1a', desc: 'リーチ最強\n首ビンタが伸びる',
    weight: 1.0, speed: 4.0, jumpPower: -13,
    reach: 1.4, power: 1.0,
    specialName: '首ビンタ'
  },
  {
    id: 'gpt', name: 'ChatGPTくん', emoji: '🤖',
    color: '#10a37f', accent: '#fff', desc: 'バランス型\nなんでもこなす',
    weight: 1.0, speed: 4.2, jumpPower: -13,
    reach: 1.0, power: 1.0,
    specialName: 'プロンプト連射'
  },
  {
    id: 'claude', name: 'Claudeちゃん', emoji: '⭐',
    color: '#c96442', accent: '#ffe1d6', desc: '速さ重視\n素早い連撃',
    weight: 0.85, speed: 5.2, jumpPower: -14,
    reach: 0.9, power: 0.85,
    specialName: 'コードビーム'
  },
  {
    id: 'gemini', name: 'Geminiさん', emoji: '💎',
    color: '#4285f4', accent: '#ea4335', desc: 'パワー型\n一撃が重い',
    weight: 1.25, speed: 3.5, jumpPower: -12.5,
    reach: 1.0, power: 1.4,
    specialName: 'マルチモーダル砲'
  },
  {
    id: 'midjourney', name: 'Midjourneyちゃん', emoji: '🎨',
    color: '#a259ff', accent: '#ff6ec7', desc: '幻想型\n美しい絵筆攻撃',
    weight: 0.9, speed: 4.5, jumpPower: -13.5,
    reach: 1.1, power: 1.05,
    specialName: 'アートストローク'
  },
  {
    id: 'manus', name: 'Manusさん', emoji: '🖐️',
    color: '#5b8def', accent: '#ffe9a8', desc: '万能型\n器用に立ち回る',
    weight: 1.05, speed: 4.0, jumpPower: -13,
    reach: 1.15, power: 1.1,
    specialName: 'タスク自動化'
  },
  {
    id: 'claudecode', name: 'ClaudeCode先生', emoji: '👨‍🏫',
    color: '#ff8a3a', accent: '#fff5d6', desc: '【隠しキャラ】\nバトルで一度勝つと出現',
    weight: 1.15, speed: 4.8, jumpPower: -13.5,
    reach: 1.25, power: 1.3,
    specialName: 'ターミナル斬り',
    hidden: true,
  },
];

// アンロック管理
const UNLOCK_KEY = 'aiSmash_unlocked_v1';
const ENCOUNTER_KEY = 'aiSmash_encounter_v1';
function loadUnlocks() {
  try {
    const raw = localStorage.getItem(UNLOCK_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}
function saveUnlocks(obj) {
  try { localStorage.setItem(UNLOCK_KEY, JSON.stringify(obj)); } catch {}
}
function isUnlocked(charId) {
  const c = CHARS.find(x => x.id === charId);
  if (!c) return false;
  if (!c.hidden) return true;
  return !!loadUnlocks()[charId];
}
function unlockChar(charId) {
  const u = loadUnlocks();
  u[charId] = true;
  saveUnlocks(u);
}
// 出現フラグ（バトルを1回クリアしたら次のバトルにClaudeCode先生が出現）
function getEncounter() {
  try { return JSON.parse(localStorage.getItem(ENCOUNTER_KEY) || '{}'); }
  catch { return {}; }
}
function setEncounter(obj) {
  try { localStorage.setItem(ENCOUNTER_KEY, JSON.stringify(obj)); } catch {}
}

function renderCharSelect() {
  charSelectEl.innerHTML = '';
  CHARS.forEach((c, i) => {
    const unlocked = isUnlocked(c.id);
    const card = document.createElement('div');
    card.className = 'charCard';
    card.style.borderColor = unlocked ? c.color : '#555';
    let badge = '';
    if (i === pickedPlayer) {
      card.classList.add('selectedPlayer');
      badge = `<span class="badge" style="background:#ffe76a;color:#222">YOU</span>`;
    } else {
      const cpuCount = pickedCPUs.filter(idx => idx === i).length;
      if (cpuCount > 0) {
        card.classList.add('selectedCPU');
        badge = `<span class="badge" style="background:#5eaaff;color:#fff">CPU×${cpuCount}</span>`;
      }
    }
    if (!unlocked) {
      card.style.opacity = '0.55';
      card.style.cursor = 'not-allowed';
      card.innerHTML = `
        <span class="emoji">❓</span>
        <div class="name" style="color:#888">？？？</div>
        <div class="desc">隠しキャラ<br>条件を満たすと出現</div>
      `;
      card.onclick = () => {
        flashHint('🔒 まだロック中… バトルで勝つと出現するよ');
      };
    } else {
      card.innerHTML = `
        ${badge}
        <span class="emoji">${c.emoji}</span>
        <div class="name" style="color:${c.color}">${c.name}</div>
        <div class="desc">${c.desc.replace(/\n/g,'<br>')}</div>
      `;
      card.onclick = () => onCharCardClick(i);
    }
    charSelectEl.appendChild(card);
  });
}

let hintTimer = null;
function flashHint(msg) {
  startHint.style.display = 'block';
  startHint.textContent = msg;
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => { startHint.style.display = 'none'; }, 1800);
}

function onCharCardClick(i) {
  if (selectedMode === 'training') {
    // トレーニングは即スタート（プレイヤー選択のみ）
    pickedPlayer = i;
    startGame(i);
    return;
  }
  // バトルモード：プレイヤー未選択なら自分用、選択済みならCPU追加
  if (pickedPlayer === -1) {
    pickedPlayer = i;
    stepLabel.innerHTML = `<span class="num">2</span>CPU3体を選んでね（クリックで追加 / 同じキャラOK）`;
  } else if (pickedCPUs.length < 3) {
    pickedCPUs.push(i);
  } else {
    flashHint('CPU枠は3体まで！クリアしてやり直してね');
  }
  renderCharSelect();
  renderCpuSlots();
  updateStartBtn();
}

function renderCpuSlots() {
  cpuSlotsEl.innerHTML = '';
  for (let s = 0; s < 3; s++) {
    const slot = document.createElement('div');
    slot.className = 'cpuSlot';
    if (pickedCPUs[s] !== undefined) {
      const c = CHARS[pickedCPUs[s]];
      slot.classList.add('filled');
      slot.innerHTML = `
        <span class="clear" title="削除">✕</span>
        <div class="emoji">${c.emoji}</div>
        <div class="name" style="color:${c.color}">${c.name}</div>
      `;
      slot.querySelector('.clear').onclick = (e) => {
        e.stopPropagation();
        pickedCPUs.splice(s, 1);
        renderCharSelect();
        renderCpuSlots();
        updateStartBtn();
      };
    } else {
      slot.innerHTML = `<div style="font-size:24px;opacity:.4">＋</div><div style="opacity:.5">CPU${s+1}</div>`;
    }
    cpuSlotsEl.appendChild(slot);
  }
}

// ======== 物理パラメータ ========
const GRAVITY = 0.55;
const FRICTION = 0.85;
const AIR_FRICTION = 0.96;
const STAGE_GROUND_Y = 380;
const STAGE_LEFT = 100;
const STAGE_RIGHT = 800;
const PLATFORM_Y = 280;
const PLATFORM_LEFT = 380;
const PLATFORM_RIGHT = 520;

// ======== 入力 ========
const keys = {};
let keyPressed = {};
// ======== 隠しコマンド（開発者用リセット） ========
// モード選択画面で「ABAB」を入力で全リセット
const KONAMI = ['a','b','a','b'];
let konamiBuf = [];
function checkKonami(key) {
  konamiBuf.push(key.toLowerCase ? key.toLowerCase() : key);
  if (konamiBuf.length > KONAMI.length) konamiBuf.shift();
  if (konamiBuf.length === KONAMI.length &&
      konamiBuf.every((k, i) => k === KONAMI[i].toLowerCase())) {
    konamiBuf = [];
    // 全リセット
    try {
      localStorage.removeItem(UNLOCK_KEY);
      localStorage.removeItem(ENCOUNTER_KEY);
    } catch {}
    // 画面に小さく通知
    showSecretToast('🔓 隠しコマンド受信：全データをリセットしました');
    setTimeout(() => location.reload(), 1200);
  }
}
function showSecretToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#000;color:#5effae;padding:10px 18px;border:1px solid #5effae;border-radius:6px;font-family:monospace;font-size:13px;z-index:9999;box-shadow:0 0 20px rgba(94,255,174,0.4);';
  document.body.appendChild(t);

}

window.addEventListener('keydown', e => {

      if (fighters[0]) { fighters[0].x = 250; fighters[0].y = STAGE_GROUND_Y - 60; fighters[0].vx = 0; fighters[0].vy = 0; fighters[0].damage = 0; fighters[0].hitstun = 0; fighters[0].grabbingId = -1; fighters[0].grabbedById = -1; fighters[0].guarding = false; fighters[0].shieldHP = 100; fighters[0].shieldBroken = 0; fighters[0].invuln = 30; }
      if (fighters[1]) { fighters[1].x = 600; fighters[1].y = STAGE_GROUND_Y - 60; fighters[1].vx = 0; fighters[1].vy = 0; fighters[1].damage = 0; fighters[1].hitstun = 0; fighters[1].grabbingId = -1; fighters[1].grabbedById = -1; fighters[1].guarding = false; fighters[1].shieldHP = 100; fighters[1].shieldBroken = 0; fighters[1].invuln = 30; }
    }

});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// ======== 状態 ========
let fighters = [];
let particles = [];
let hitMarks = [];
let camShake = 0;
let gameState = 'select'; // select / playing / result
let playerIdx = 0;
let winnerName = '';
let bossEntryTimer = 0;

// ======== ファイター作成 ========
function createFighter(charDef, x, isPlayer) {
  return {
    char: charDef,
    x: x, y: STAGE_GROUND_Y - 60,
    vx: 0, vy: 0,
    w: 38, h: 60,
    facing: x < W/2 ? 1 : -1,
    onGround: false,
    jumpsLeft: 2,
    damage: 0,
    stocks: 3,
    isPlayer: isPlayer,
    state: 'idle', // idle / walk / jump / attack / hit / guard / grab / grabbed
    attackTimer: 0,
    attackType: null, // 'normal' / 'smash' / 'special' / 'grab'
    hitstun: 0,
    invuln: 0,
    aiTimer: 0,
    aiAction: 'approach',
    walkFrame: 0,
    flashTimer: 0,
    guarding: false,
    shieldHP: 100,
    shieldStun: 0, // ガード硬直
    shieldBroken: 0, // シールドブレイク残時間
    grabbingId: -1, // 掴んでいる相手のインデックス
    grabbedById: -1, // 掴まれている相手のインデックス
    grabTimer: 0,
    grabBuffer: 0, // 掴まれてる側の脱出ゲージ
  };
}

function startGame(charIdx) {
  playerIdx = charIdx;
  overlay.classList.add('hide');
  gameState = 'playing';
  fighters = [];

  if (selectedMode === 'training') {
    // プレイヤー1体 + サンドバッグCPU1体（ストック99）
    const p = createFighter(CHARS[charIdx], 250, true);
    p.stocks = 99;
    fighters.push(p);
    // ダミーは隠しキャラ以外からプレイヤーと違うキャラを選ぶ
    const dummyChar = CHARS.find((c, i) => i !== charIdx && !c.hidden);
    const dummy = createFighter(dummyChar, 600, false);
    dummy.stocks = 99;
    dummy.aiLevel = selectedLevel;
    fighters.push(dummy);
  } else {
    // プレイヤー
    fighters.push(createFighter(CHARS[charIdx], 200, true));
    // ユーザーが選んだCPU3体を使う
    let comChars = pickedCPUs.map(i => CHARS[i]);
    // 念のため3体未満ならランダムで埋める
    while (comChars.length < 3) {
      const pool = CHARS.filter(c => !c.hidden || isUnlocked(c.id));
      comChars.push(pool[Math.floor(Math.random()*pool.length)]);
    }
    [450, 600, 750].forEach((x, i) => {
      const c = createFighter(comChars[i], x, false);
      c.aiLevel = (comChars[i].id === 'claudecode')
        ? Math.min(9, selectedLevel + 2)
        : selectedLevel;
      c.isBoss = (comChars[i].id === 'claudecode');
      fighters.push(c);
    });
    bossEntryTimer = 0;
  }

  particles = [];
  hitMarks = [];
  winnerName = '';
}

// ======== AI ========
function updateAI(f) {
  if (f.hitstun > 0) return;
  f.aiTimer--;

  // 復帰AI：崖外なら戻る
  if (f.x < STAGE_LEFT - 20) {
    f.vx += 0.3;
    if (!f.onGround && f.jumpsLeft > 0 && f.vy > 0) {
      f.vy = f.char.jumpPower * 0.9;
      f.jumpsLeft--;
    }
    return;
  }
  if (f.x > STAGE_RIGHT + 20) {
    f.vx -= 0.3;
    if (!f.onGround && f.jumpsLeft > 0 && f.vy > 0) {
      f.vy = f.char.jumpPower * 0.9;
      f.jumpsLeft--;
    }
    return;
  }

  const lv = f.aiLevel || 5;
  const lp = getLevelParams(lv);

  // トレーニングモードのCPUは攻撃しない（Lv1相当でも放置気味、Lv高いと反撃）
  const isDummy = selectedMode === 'training';

  if (f.aiTimer <= 0) {
    f.aiTimer = lp.aiTickMin + Math.random()*lp.aiTickRand;
    const r = Math.random();
    if (r < lp.approachBias) f.aiAction = 'approach';
    else if (r < lp.approachBias + 0.15) f.aiAction = 'jump';
    else if (r < lp.approachBias + 0.30) f.aiAction = 'retreat';
    else f.aiAction = 'wait';
  }

  // ターゲット選定（最も近い敵）
  let target = null, minDist = Infinity;
  fighters.forEach(o => {
    if (o === f || o.stocks <= 0) return;
    const d = Math.abs(o.x - f.x);
    if (d < minDist) { minDist = d; target = o; }
  });
  if (!target) return;

  f.facing = target.x > f.x ? 1 : -1;
  const dist = Math.abs(target.x - f.x);

  // Lv1は半分くらい止まってる
  if (lv === 1 && Math.random() < 0.7) return;

  if (f.aiAction === 'approach') {
    f.vx += f.facing * 0.4 * lp.moveSpeedScale;
  } else if (f.aiAction === 'retreat') {
    f.vx -= f.facing * 0.3 * lp.moveSpeedScale;
  } else if (f.aiAction === 'jump' && f.onGround) {
    f.vy = f.char.jumpPower;
    f.jumpsLeft--;
    f.onGround = false;
  }

  // トレーニングモードのCPUは反撃しない（攻撃判定スキップ）
  if (isDummy && lv < 6) return;

  // 攻撃判断
  const reach = 60 * f.char.reach;
  if (dist < reach + 10 && f.attackTimer <= 0 && !f.guarding && f.grabbingId < 0 && f.grabbedById < 0) {
    if (Math.random() < lp.attackChance) {
      const r = Math.random();
      if (r < (1 - lp.smashRatio - 0.2)) doAttack(f, 'normal');
      else if (r < (1 - 0.2)) doAttack(f, 'smash');
      else if (r < (1 - 0.2) + (1 - lp.grabChance) * 0.15) doAttack(f, 'special');
      else doAttack(f, 'grab');
    }
  }

  // ガード判断：相手がスマッシュ・必殺中ならガード
  if (dist < reach + 30 && !f.guarding && f.attackTimer <= 0 && f.shieldHP > 30 && f.shieldBroken <= 0) {
    if (target.attackTimer > 0 && (target.attackType === 'smash' || target.attackType === 'special')) {
      if (Math.random() < lp.guardChance) f.guarding = true;
    }
  }
  // ガード解除：高レベルほど反確を狙う
  if (f.guarding) {
    if (target.attackTimer > 0 && target.attackTimer < 8 && Math.random() < lp.punishChance) {
      f.guarding = false;
      doAttack(f, Math.random() < 0.5 ? 'smash' : 'grab');
    } else if (Math.random() < 0.05) f.guarding = false;
  }
}

// ======== 攻撃 ========
function doAttack(f, type) {
  if (f.attackTimer > 0 || f.hitstun > 0 || f.shieldStun > 0 || f.shieldBroken > 0) return;
  if (f.grabbingId >= 0 || f.grabbedById >= 0) return;
  if (f.guarding) return;
  f.attackType = type;
  if (type === 'normal') f.attackTimer = 20;
  else if (type === 'smash') f.attackTimer = 35;
  else if (type === 'special') f.attackTimer = 45;
  else if (type === 'grab') f.attackTimer = 22;
  f.state = 'attack';
}

function getAttackHitbox(f) {
  if (f.attackTimer <= 0 || !f.attackType) return null;
  // 攻撃発生フレーム範囲
  let activeMin, activeMax, w, h, dmg, kbBase, kbScale, total;
  if (f.attackType === 'normal') {
    activeMin = 6; activeMax = 14; total = 20;
    w = 50 * f.char.reach; h = 30; dmg = 5; kbBase = 3; kbScale = 0.06;
  } else if (f.attackType === 'smash') {
    activeMin = 14; activeMax = 26; total = 35;
    w = 65 * f.char.reach; h = 40; dmg = 13; kbBase = 6; kbScale = 0.18;
  } else if (f.attackType === 'special') {
    activeMin = 20; activeMax = 38; total = 45;
    w = 75 * f.char.reach; h = 35; dmg = 9; kbBase = 5; kbScale = 0.13;
  } else if (f.attackType === 'grab') {
    activeMin = 6; activeMax = 14; total = 22;
    w = 32; h = 40; dmg = 0; kbBase = 0; kbScale = 0;
  }
  const elapsed = total - f.attackTimer;
  if (elapsed < activeMin || elapsed > activeMax) return null;

  const hbX = f.x + (f.facing > 0 ? f.w/2 : -f.w/2 - w);
  const hbY = f.y + 10;
  return {
    x: hbX, y: hbY, w, h,
    dmg: dmg * f.char.power,
    kbBase, kbScale,
    facing: f.facing,
    type: f.attackType,
  };
}

function rectsOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function applyHit(attacker, target, hitbox) {
  // 掴みの場合はガードも貫通
  if (hitbox.type === 'grab') {
    // 既に掴まれてる/掴んでるなら無効
    if (target.grabbedById >= 0 || target.grabbingId >= 0) return;
    if (target.invuln > 0) return;
    // ガード貫通：ガード解除させて掴む
    target.guarding = false;
    const attIdx = fighters.indexOf(attacker);
    const tgtIdx = fighters.indexOf(target);
    attacker.grabbingId = tgtIdx;
    target.grabbedById = attIdx;
    attacker.grabTimer = 90; // 1.5秒くらいキープ
    target.grabBuffer = 100; // 脱出ゲージ
    attacker.attackTimer = 0;
    attacker.attackType = null;
    attacker.state = 'grab';
    target.state = 'grabbed';
    target.vx = 0; target.vy = 0;
    return;
  }

  // ガード処理
  if (target.guarding && target.shieldBroken <= 0) {
    target.shieldHP -= hitbox.dmg * 1.8 + 5;
    target.shieldStun = Math.min(20, 6 + Math.floor(hitbox.dmg / 2));
    // 攻撃側にも硬直（反確）
    attacker.shieldStun = Math.min(15, 4 + Math.floor(hitbox.dmg / 3));
    // ガード弾きエフェクト
    for (let i = 0; i < 8; i++) {
      particles.push({
        x: target.x, y: target.y + target.h/2,
        vx: -hitbox.facing * (Math.random()*4+2),
        vy: (Math.random()-0.5)*4,
        life: 18,
        color: '#5eaaff',
      });
    }
    camShake = 6;
    // シールドブレイク
    if (target.shieldHP <= 0) {
      target.shieldHP = 0;
      target.shieldBroken = 90; // 90F の長い硬直
      target.guarding = false;
      target.hitstun = 90;
      // シールドブレイク演出
      for (let i = 0; i < 30; i++) {
        particles.push({
          x: target.x, y: target.y + target.h/2,
          vx: (Math.random()-0.5)*10,
          vy: (Math.random()-0.5)*10 - 3,
          life: 40,
          color: ['#5eaaff','#fff','#ffe76a'][Math.floor(Math.random()*3)],
        });
      }
      camShake = 15;
    }
    return;
  }

  target.damage += hitbox.dmg;
  // 吹っ飛び量＝(基礎+蓄積%×係数)×重量補正
  const kb = (hitbox.kbBase + target.damage * hitbox.kbScale) / target.char.weight;
  const angle = hitbox.type === 'smash' ? -0.55 : -0.35;
  target.vx = Math.cos(angle) * kb * hitbox.facing;
  target.vy = Math.sin(angle) * kb;
  target.hitstun = Math.min(40, 10 + Math.floor(kb * 1.5));
  target.invuln = 8;
  target.state = 'hit';
  target.flashTimer = 8;

  // ヒットマーク
  hitMarks.push({
    x: target.x + target.w/2,
    y: target.y + target.h/2,
    life: 12,
    size: hitbox.type === 'smash' ? 60 : 40,
  });

  // パーティクル
  for (let i = 0; i < 14; i++) {
    particles.push({
      x: target.x + target.w/2,
      y: target.y + target.h/2,
      vx: (Math.random()-0.5) * 8,
      vy: (Math.random()-0.5) * 8 - 2,
      life: 25,
      color: ['#fff','#ffe76a','#ff8a8a'][Math.floor(Math.random()*3)],
    });
  }

  camShake = Math.min(20, 5 + kb * 0.6);

  // 撃墜判定
  setTimeout(() => {}, 0); // placeholder
}

function performThrow(att, tgt, dir) {
  // 投げ性能： dir ごとにダメージ・角度・KB倍率
  // forward: 前方斜め前 / back: 反対方向 / up: 真上（撃墜向き） / down: 地面に叩きつけ
  const profiles = {
    forward: { dmg: 9,  kbBase: 5, kbScale: 0.13, angle: -0.40, fx: att.facing },
    back:    { dmg: 11, kbBase: 6, kbScale: 0.14, angle: -0.40, fx: -att.facing },
    up:      { dmg: 8,  kbBase: 4, kbScale: 0.16, angle: -1.35, fx: 0 },
    down:    { dmg: 7,  kbBase: 3, kbScale: 0.10, angle:  0.30, fx: att.facing },
  };
  const p = profiles[dir] || profiles.forward;

  tgt.damage += p.dmg;
  const kb = (p.kbBase + tgt.damage * p.kbScale) / tgt.char.weight;
  tgt.vx = Math.cos(p.angle) * kb * (p.fx === 0 ? 0 : Math.sign(p.fx));
  tgt.vy = Math.sin(p.angle) * kb;
  tgt.hitstun = 24;
  tgt.invuln = 6;
  tgt.flashTimer = 6;

  // 解除
  att.grabbingId = -1;
  tgt.grabbedById = -1;
  att.grabTimer = 0;
  tgt.grabBuffer = 0;
  att.state = 'idle';
  tgt.state = 'hit';

  // エフェクト
  for (let i = 0; i < 16; i++) {
    particles.push({
      x: tgt.x, y: tgt.y + tgt.h/2,
      vx: (Math.random()-0.5)*8 + (p.fx ? p.fx*3 : 0),
      vy: (Math.random()-0.5)*8 - (dir === 'up' ? 4 : 1),
      life: 28,
      color: ['#fff','#ffe76a','#ff8a8a'][Math.floor(Math.random()*3)],
    });
  }
  hitMarks.push({ x: tgt.x, y: tgt.y + tgt.h/2, life: 14, size: 56 });
  camShake = 14;
}

function releaseGrab(att, tgt, doThrow) {
  att.grabbingId = -1;
  tgt.grabbedById = -1;
  att.grabTimer = 0;
  tgt.grabBuffer = 0;
  att.state = 'idle';
  tgt.state = 'idle';
  if (doThrow) {
    // 投げダメージ＆吹っ飛び
    const dmg = 10;
    tgt.damage += dmg;
    const kb = (5 + tgt.damage * 0.13) / tgt.char.weight;
    tgt.vx = Math.cos(-0.45) * kb * att.facing;
    tgt.vy = Math.sin(-0.45) * kb;
    tgt.hitstun = 22;
    tgt.invuln = 6;
    tgt.flashTimer = 6;
    // 投げエフェクト
    for (let i = 0; i < 14; i++) {
      particles.push({
        x: tgt.x, y: tgt.y + tgt.h/2,
        vx: (Math.random()-0.5)*8 + att.facing*3,
        vy: (Math.random()-0.5)*8 - 2,
        life: 25,
        color: ['#fff','#ffe76a','#ff8a8a'][Math.floor(Math.random()*3)],
      });
    }
    hitMarks.push({ x: tgt.x, y: tgt.y + tgt.h/2, life: 12, size: 50 });
    camShake = 12;
  } else {
    // 脱出時：両者軽くノックバック
    tgt.vx = -att.facing * 3;
    att.vx = att.facing * -2;
    tgt.invuln = 20;
  }
}

// ======== 物理更新 ========
function updateFighter(f) {
  if (f.stocks <= 0) return;

  f.flashTimer = Math.max(0, f.flashTimer - 1);
  f.invuln = Math.max(0, f.invuln - 1);
  f.shieldStun = Math.max(0, f.shieldStun - 1);
  f.shieldBroken = Math.max(0, f.shieldBroken - 1);

  // シールドHP回復（ガードしてないとき）
  if (!f.guarding && f.shieldBroken <= 0) {
    f.shieldHP = Math.min(100, f.shieldHP + 0.25);
  } else if (f.guarding) {
    f.shieldHP -= 0.15; // ガード中も減る
    if (f.shieldHP <= 0) {
      f.shieldHP = 0;
      f.shieldBroken = 90;
      f.guarding = false;
      f.hitstun = 90;
    }
  }

  // 掴み処理（掴んでる側）
  if (f.grabbingId >= 0) {
    const t = fighters[f.grabbingId];
    f.grabTimer--;
    // 相手を自分の前に固定
    t.x = f.x + f.facing * (f.w/2 + t.w/2);
    t.y = f.y;
    t.vx = 0; t.vy = 0;
    t.hitstun = 1;
    f.state = 'grab';
    f.vx *= 0.5;

    // プレイヤーは投げ方向を選択
    if (f.isPlayer) {
      if (keyPressed['a'] || keyPressed['A']) { performThrow(f, t, 'forward'); return; }
      if (keyPressed['s'] || keyPressed['S']) { performThrow(f, t, 'back'); return; }
      if (keyPressed['d'] || keyPressed['D']) { performThrow(f, t, 'up'); return; }
      if (keyPressed['ArrowDown']) { performThrow(f, t, 'down'); return; }
    } else {
      // AIはレベルで投げ方向を選ぶ
      const lv = f.aiLevel || 5;
      const lp = getLevelParams(lv);
      // 投げタイミング：レベルが高いほど早めに投げる（暴れ抜けされる前に）
      const throwAt = lv >= 7 ? 70 : lv >= 4 ? 55 : 30;
      if (f.grabTimer <= 90 - throwAt) {
        // 高レベルは状況判断：相手の%が高ければ上投げで撃墜、低ければ前投げ・後ろ投げで位置調整
        let dir;
        if (lv >= 6 && t.damage > 90) dir = 'up';
        else if (lv >= 5) dir = ['forward','back','up','down'][Math.floor(Math.random()*4)];
        else dir = Math.random() < 0.7 ? 'forward' : 'down';
        performThrow(f, t, dir);
        return;
      }
    }

    if (f.grabTimer <= 0 || t.grabBuffer <= 0) {
      // 投げ：時間切れ or 相手が暴れて脱出
      const escaped = t.grabBuffer <= 0;
      releaseGrab(f, t, !escaped);
    }
    return;
  }
  // 掴まれてる側
  if (f.grabbedById >= 0) {
    f.state = 'grabbed';
    f.vx = 0; f.vy = 0;
    // 暴れて脱出（プレイヤーは連打、AIは自動減少）
    if (f.isPlayer) {
      // 何かキー押したら少し減る
      ['a','A','s','S','d','D','f','F','g','G','ArrowLeft','ArrowRight'].forEach(k => {
        if (keyPressed[k]) f.grabBuffer -= 18;
      });
      f.grabBuffer -= 0.4;
    } else {
      f.grabBuffer -= 0.6 + Math.random()*0.8;
    }
    return;
  }

  if (f.hitstun > 0) {
    f.hitstun--;
    f.attackTimer = 0;
    f.guarding = false;
    f.state = 'hit';
  } else if (f.shieldBroken > 0) {
    f.state = 'broken';
    f.attackTimer = 0;
  } else if (f.shieldStun > 0) {
    f.state = 'guard';
    f.guarding = true;
  } else if (f.attackTimer > 0) {
    f.attackTimer--;
    if (f.attackTimer === 0) {
      f.attackType = null;
      f.state = 'idle';
    }
  }

  // 入力（プレイヤー or AI）
  if (f.isPlayer && f.hitstun === 0 && f.shieldBroken <= 0 && f.shieldStun === 0) {
    // ガード（地上のみ、押しっぱなしで継続）
    const wantGuard = (keys['f'] || keys['F']) && f.onGround && f.attackTimer === 0;
    f.guarding = wantGuard && f.shieldHP > 0;

    if (!f.guarding && f.attackTimer === 0) {
      if (keys['ArrowLeft']) { f.vx -= 0.6; f.facing = -1; }
      if (keys['ArrowRight']) { f.vx += 0.6; f.facing = 1; }
      if ((keyPressed[' '] || keyPressed['ArrowUp']) && f.jumpsLeft > 0) {
        f.vy = f.char.jumpPower;
        f.jumpsLeft--;
        f.onGround = false;
        if (f.jumpsLeft === 0) {
          for (let i = 0; i < 8; i++) {
            particles.push({
              x: f.x + f.w/2, y: f.y + f.h,
              vx: (Math.random()-0.5)*3,
              vy: Math.random()*2 + 1,
              life: 20, color: '#fff',
            });
          }
        }
      }
      if (keyPressed['a'] || keyPressed['A']) doAttack(f, 'normal');
      if (keyPressed['s'] || keyPressed['S']) doAttack(f, 'smash');
      if (keyPressed['d'] || keyPressed['D']) doAttack(f, 'special');
      if (keyPressed['g'] || keyPressed['G']) doAttack(f, 'grab');
    }
  } else if (!f.isPlayer && f.stocks > 0) {
    updateAI(f);
  }

  // ガード中は移動不可
  if (f.guarding) {
    f.vx *= 0.7;
    f.state = 'guard';
  }

  // 速度制限
  const maxSpeed = f.char.speed;
  if (f.attackTimer === 0 && f.hitstun === 0) {
    f.vx = Math.max(-maxSpeed, Math.min(maxSpeed, f.vx));
  }

  // 重力
  f.vy += GRAVITY;
  if (f.vy > 16) f.vy = 16;

  // 移動
  f.x += f.vx;
  f.y += f.vy;

  // 摩擦
  if (f.onGround) f.vx *= FRICTION;
  else f.vx *= AIR_FRICTION;

  // 地面判定（メインステージ）
  if (f.x + f.w/2 > STAGE_LEFT && f.x - f.w/2 < STAGE_RIGHT) {
    if (f.y + f.h > STAGE_GROUND_Y && f.vy >= 0) {
      f.y = STAGE_GROUND_Y - f.h;
      f.vy = 0;
      f.onGround = true;
      f.jumpsLeft = 2;
    }
  }
  // プラットフォーム（中央上）
  if (f.x + f.w/2 > PLATFORM_LEFT && f.x - f.w/2 < PLATFORM_RIGHT) {
    if (f.vy >= 0 && f.y + f.h > PLATFORM_Y && f.y + f.h < PLATFORM_Y + 12) {
      f.y = PLATFORM_Y - f.h;
      f.vy = 0;
      f.onGround = true;
      f.jumpsLeft = 2;
    }
  }
  if (!(f.x + f.w/2 > STAGE_LEFT && f.x - f.w/2 < STAGE_RIGHT && f.y + f.h >= STAGE_GROUND_Y - 2) &&
      !(f.x + f.w/2 > PLATFORM_LEFT && f.x - f.w/2 < PLATFORM_RIGHT && Math.abs(f.y + f.h - PLATFORM_Y) < 4)) {
    f.onGround = false;
  }

  // 撃墜判定（画面外）
  if (f.x < -100 || f.x > W+100 || f.y > H+100 || f.y < -150) {
    if (selectedMode !== 'training') f.stocks--;
    if (selectedMode !== 'training') f.damage = 0;
    if (f.stocks > 0) {
      // リスポーン
      f.x = 200 + Math.random()*500;
      f.y = -50;
      f.vx = 0; f.vy = 0;
      f.hitstun = 0;
      f.invuln = 90;
      f.attackTimer = 0;
      f.state = 'idle';
      // 撃墜エフェクト
      for (let i = 0; i < 30; i++) {
        particles.push({
          x: f.x + f.w/2, y: H/2,
          vx: (Math.random()-0.5)*15,
          vy: (Math.random()-0.5)*15,
          life: 40,
          color: f.char.color,
        });
      }
      camShake = 20;
    }
  }

  if (f.attackTimer === 0 && f.hitstun === 0) {
    if (Math.abs(f.vx) > 0.5 && f.onGround) {
      f.state = 'walk';
      f.walkFrame += 0.25;
    } else if (!f.onGround) {
      f.state = 'jump';
    } else {
      f.state = 'idle';
    }
  }
}

// ======== 当たり判定 ========
function processHits() {
  fighters.forEach(att => {
    if (att.stocks <= 0) return;
    const hb = getAttackHitbox(att);
    if (!hb) return;
    fighters.forEach(t => {
      if (t === att || t.stocks <= 0) return;
      if (t.invuln > 0) return;
      const tb = { x: t.x - t.w/2, y: t.y, w: t.w, h: t.h };
      if (rectsOverlap(hb, tb)) {
        applyHit(att, t, hb);
      }
    });
  });
}

// ======== 描画 ========
function drawStage() {
  // 背景：星空＋遠景の草原
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);
  // 星
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 40; i++) {
    const x = (i*97 % W);
    const y = (i*53 % 250);
    ctx.fillRect(x, y, 2, 2);
  }
  // 月
  ctx.fillStyle = '#ffe76a';
  ctx.beginPath();
  ctx.arc(750, 90, 35, 0, Math.PI*2);
  ctx.fill();

  // ステージ床
  const grad = ctx.createLinearGradient(0, STAGE_GROUND_Y, 0, H);
  grad.addColorStop(0, '#7AC74F');
  grad.addColorStop(0.15, '#5a9c34');
  grad.addColorStop(1, '#3a6620');
  ctx.fillStyle = grad;
  ctx.fillRect(STAGE_LEFT, STAGE_GROUND_Y, STAGE_RIGHT - STAGE_LEFT, H - STAGE_GROUND_Y);
  // 縁
  ctx.fillStyle = '#5a9c34';
  ctx.fillRect(STAGE_LEFT, STAGE_GROUND_Y, STAGE_RIGHT - STAGE_LEFT, 8);

  // プラットフォーム
  ctx.fillStyle = '#ddd';
  ctx.fillRect(PLATFORM_LEFT, PLATFORM_Y, PLATFORM_RIGHT - PLATFORM_LEFT, 10);
  ctx.fillStyle = '#999';
  ctx.fillRect(PLATFORM_LEFT, PLATFORM_Y + 8, PLATFORM_RIGHT - PLATFORM_LEFT, 2);
}

function drawFighter(f) {
  if (f.stocks <= 0) return;
  ctx.save();

  // 無敵中は点滅
  if (f.invuln > 0 && Math.floor(f.invuln/3) % 2 === 0) {
    ctx.globalAlpha = 0.5;
  }
  // ヒット時の白フラッシュ
  const flash = f.flashTimer > 0;

  ctx.translate(f.x, f.y + f.h);
  ctx.scale(f.facing, 1);

  const c = f.char.color;
  const a = f.char.accent;

  // 影
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 0, 22, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // ジャンプ・歩きアニメ
  let bob = 0;
  if (f.state === 'walk') bob = Math.sin(f.walkFrame) * 2;
  if (f.state === 'jump') bob = -2;

  // キャラ別描画
  if (f.char.id === 'giraffe') {
    drawGiraffeChar(c, a, bob, f, flash);
  } else if (f.char.id === 'gpt') {
    drawRobotChar('#10a37f', '#fff', bob, f, flash, '🤖');
  } else if (f.char.id === 'claude') {
    drawClaudeChar('#c96442', '#ffe1d6', bob, f, flash);
  } else if (f.char.id === 'gemini') {
    drawGeminiChar('#4285f4', '#ea4335', bob, f, flash);
  } else if (f.char.id === 'midjourney') {
    drawMidjourneyChar(c, a, bob, f, flash);
  } else if (f.char.id === 'manus') {
    drawManusChar(c, a, bob, f, flash);
  } else if (f.char.id === 'claudecode') {
    drawClaudeCodeChar(c, a, bob, f, flash);
  }

  // 攻撃エフェクト
  if (f.attackTimer > 0 && f.attackType) {
    drawAttackEffect(f);
  }

  ctx.restore();

  // ガードシールド（拡大縮小しない座標で描画）
  if (f.guarding) {
    ctx.save();
    const cx = f.x;
    const cy = f.y + f.h/2;
    const sizeRatio = 0.5 + (f.shieldHP / 100) * 0.7;
    const r = 38 * sizeRatio;
    const grd = ctx.createRadialGradient(cx, cy, 5, cx, cy, r);
    const colorOuter = f.shieldHP > 50 ? '#5eaaff' : f.shieldHP > 25 ? '#ffe76a' : '#ff5e5e';
    grd.addColorStop(0, 'rgba(255,255,255,0.3)');
    grd.addColorStop(0.7, colorOuter + 'aa');
    grd.addColorStop(1, colorOuter + '33');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = colorOuter;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }
  // シールドブレイク中（目を回す）
  if (f.shieldBroken > 0) {
    ctx.save();
    ctx.fillStyle = '#ffe76a';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    const stars = ['💫','✨','💫','✨'];
    const idx = Math.floor((90 - f.shieldBroken) / 6) % stars.length;
    ctx.fillText(stars[idx] + stars[idx], f.x, f.y - 8);
    ctx.restore();
  }
  // 掴まれ中（汗）
  if (f.grabbedById >= 0) {
    ctx.save();
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('💦', f.x + 10, f.y - 4);
    // 脱出ゲージ
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(f.x - 20, f.y - 14, 40, 4);
    ctx.fillStyle = '#5effae';
    ctx.fillRect(f.x - 20, f.y - 14, 40 * Math.max(0, f.grabBuffer/100), 4);
    ctx.restore();
  }
  // 掴み中（手）
  if (f.grabbingId >= 0) {
    ctx.save();
    ctx.font = '18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('✊', f.x + f.facing*22, f.y + 30);
    ctx.restore();
  }
}

  ctx.fillRect(-10, -63 + bob, 7, 6);
  ctx.fillRect(3, -63 + bob, 7, 6);
  ctx.fillRect(-3, -61 + bob, 6, 1);
  // 目（メガネの中）
  fillIfNotFlash(flash, '#fff');
  ctx.fillRect(-9, -62 + bob, 5, 4);
  ctx.fillRect(4, -62 + bob, 5, 4);
  fillIfNotFlash(flash, '#000');
  ctx.fillRect(-8, -61 + bob, 3, 2);
  ctx.fillRect(5, -61 + bob, 3, 2);
  // 髪（黒）
  fillIfNotFlash(flash, '#1a1a1a');
  ctx.fillRect(-13, -72 + bob, 26, 5);
  ctx.fillRect(-10, -75 + bob, 14, 4);
  // 口（先生っぽく一文字）
  fillIfNotFlash(flash, '#000');
  ctx.fillRect(-3, -54 + bob, 6, 1);
  // 指示棒（攻撃中じゃない時もちょっと持ってる）
  fillIfNotFlash(flash, '#bbb');
  ctx.fillRect(15, -46 + bob, 14, 2);
  fillIfNotFlash(flash, '#ff3a3a');
  ctx.fillRect(28, -47 + bob, 3, 4);
}

function drawAttackEffect(f) {
  const reach = 60 * f.char.reach;
  const totalFrames = f.attackType === 'normal' ? 20 : f.attackType === 'smash' ? 35 : 45;
  const elapsed = totalFrames - f.attackTimer;
  const progress = elapsed / totalFrames;

  ctx.save();
  // 攻撃の軌跡
  if (f.attackType === 'normal') {
    ctx.fillStyle = `rgba(255,255,255,${0.6*(1-progress)})`;
    ctx.beginPath();
    ctx.arc(reach*0.5, -30, 25, 0, Math.PI*2);
    ctx.fill();
  } else if (f.attackType === 'smash') {
    // でかい斬撃
    ctx.fillStyle = `rgba(255,200,80,${0.7*(1-progress)})`;
    ctx.beginPath();
    ctx.ellipse(reach*0.6, -30, 35, 18, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = `rgba(255,255,255,${0.9*(1-progress)})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(reach*0.6, -30, 30, -Math.PI/3, Math.PI/3);
    ctx.stroke();
  } else if (f.attackType === 'special') {
    // ビーム
    ctx.fillStyle = f.char.color;
    ctx.globalAlpha = 0.7 * (1-progress);
    ctx.fillRect(20, -38, reach, 14);
    ctx.fillStyle = '#fff';
    ctx.fillRect(20, -34, reach, 6);
  } else if (f.attackType === 'grab') {
    // 掴む手のエフェクト
    ctx.globalAlpha = 1 - progress;
    ctx.font = '24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText('✋', 30, -28);
  }
  ctx.restore();
}

function drawHUD() {
  // 各キャラのダメージ％とストック
  const slotW = 200;
  const startX = (W - slotW * fighters.length) / 2;
  fighters.forEach((f, i) => {
    const x = startX + i * slotW;
    const y = H - 70;
    // 背景
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(x, y, slotW - 8, 60);
    ctx.strokeStyle = f.char.color;
    ctx.lineWidth = f.isPlayer ? 3 : 1;
    ctx.strokeRect(x, y, slotW - 8, 60);

    // 絵文字
    ctx.font = '32px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(f.char.emoji, x + 6, y + 38);

    // 名前
    ctx.fillStyle = f.char.color;
    ctx.font = 'bold 11px sans-serif';
    ctx.fillText(f.char.name + (f.isPlayer ? ' (YOU)' : ''), x + 46, y + 14);

    // ダメージ%
    const dmgColor = f.damage < 30 ? '#fff' :
                     f.damage < 80 ? '#ffe76a' :
                     f.damage < 150 ? '#ff8a3a' : '#ff3a3a';
    ctx.fillStyle = dmgColor;
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.floor(f.damage) + '%', x + slotW - 14, y + 38);

    // ストック
    ctx.fillStyle = f.char.color;
    for (let s = 0; s < 3; s++) {
      ctx.globalAlpha = s < f.stocks ? 1 : 0.2;
      ctx.beginPath();
      ctx.arc(x + 50 + s*12, y + 50, 4, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    // シールドHPバー
    const shieldX = x + 95, shieldY = y + 47, shieldW = 70;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(shieldX, shieldY, shieldW, 6);
    const shColor = f.shieldHP > 50 ? '#5eaaff' : f.shieldHP > 25 ? '#ffe76a' : '#ff5e5e';
    ctx.fillStyle = shColor;
    ctx.fillRect(shieldX, shieldY, shieldW * (f.shieldHP/100), 6);
    ctx.fillStyle = '#aaa';
    ctx.font = '8px sans-serif';
    ctx.fillText('SHIELD', shieldX, shieldY - 2);
    ctx.textAlign = 'left';
  });
}

function drawTrainingHUD() {
  if (selectedMode !== 'training' || gameState !== 'playing') return;
  const p = fighters[0];
  if (!p) return;

  // 左上にトレーニング情報
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(10, 10, 230, 130);
  ctx.strokeStyle = '#5effae';
  ctx.lineWidth = 2;
  ctx.strokeRect(10, 10, 230, 130);
  ctx.fillStyle = '#5effae';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('🥋 TRAINING MODE', 20, 30);
  ctx.fillStyle = '#fff';
  ctx.font = '11px sans-serif';
  ctx.fillText(`CPUレベル: ${selectedLevel} / 9`, 20, 48);
  ctx.fillText(`自分の%: ${Math.floor(p.damage)}%`, 20, 64);
  ctx.fillText(`相手の%: ${Math.floor(fighters[1].damage)}%`, 20, 80);
  ctx.fillStyle = '#aaa';
  ctx.fillText('Rキー: %とポジション初期化', 20, 100);
  ctx.fillText('落下しても撃墜されない', 20, 116);
  ctx.fillText('ESCで戻る', 20, 132);
  ctx.restore();

  // 操作チートシート（右上）
  ctx.save();
  const cx = W - 240, cy = 10, cw = 230, ch = 168;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(cx, cy, cw, ch);
  ctx.strokeStyle = '#ffe76a';
  ctx.lineWidth = 2;
  ctx.strokeRect(cx, cy, cw, ch);
  ctx.fillStyle = '#ffe76a';
  ctx.font = 'bold 13px sans-serif';
  ctx.fillText('⌨️ 操作', cx + 10, cy + 20);
  ctx.fillStyle = '#fff';
  ctx.font = '11px sans-serif';
  const lines = [
    '←→ : 移動',
    '↑/Space : ジャンプ（2段可）',
    'A : 通常攻撃 / S : スマッシュ',
    'D : 必殺技',
    'F : ガード（押しっぱ）',
    'G : 掴み',
    '掴み中:',
    '  A前 / S後ろ / D上 / ↓下 投げ',
  ];
  lines.forEach((l, i) => ctx.fillText(l, cx + 10, cy + 40 + i*15));
  ctx.restore();
}

function drawHitMarks() {
  hitMarks.forEach(h => {
    const t = h.life / 12;
    ctx.save();
    ctx.translate(h.x, h.y);
    ctx.globalAlpha = t;
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${h.size * (1 + (1-t)*0.5)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('💥', 0, 0);
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.max(0, p.life/30);
    ctx.fillRect(p.x-2, p.y-2, 4, 4);
  });
  ctx.globalAlpha = 1;
}

// ======== ゲームループ ========
function checkWinner() {
  if (selectedMode === 'training') return;
  const alive = fighters.filter(f => f.stocks > 0);
  if (alive.length <= 1 && fighters.length > 1) {
    if (alive.length === 1) {
      winnerName = alive[0].char.name + (alive[0].isPlayer ? ' (YOU!)' : '');
      const youWon = alive[0].isPlayer;
      const bossWasInMatch = fighters.some(f => f.char.id === 'claudecode');
      const bossDefeated = bossWasInMatch && youWon;

      gameState = 'result';

      // 隠しキャラ初撃破でアンロック
      let unlockMsg = '';
      if (bossDefeated && !isUnlocked('claudecode')) {
        unlockChar('claudecode');
        unlockMsg = `<div style="margin-top:14px;padding:12px;background:rgba(255,138,58,0.2);border:2px solid #ff8a3a;border-radius:8px;font-size:15px;color:#ffd6a8;">
          🎉 <b>新キャラ解放！</b> 🎉<br>
          👨‍🏫 <b style="color:#ff8a3a">ClaudeCode先生</b> が使用可能に！
        </div>`;
      }

      // ボス戦への自動遷移判定：通常バトル終了時、先生が未解放ならボス戦へ
      const goToBoss = !bossWasInMatch && !isUnlocked('claudecode')
                       && CHARS[playerIdx].id !== 'claudecode';

      if (goToBoss) {
        _nextAction = 'bossFight';
        unlockMsg = `<div style="margin-top:14px;padding:14px;background:rgba(255,138,58,0.18);border:2px solid #ff8a3a;border-radius:8px;font-size:14px;color:#ffd6a8;">
          ⚡ <b style="color:#ff8a3a">ClaudeCode先生</b> がやってきた…！<br>
          <span style="font-size:12px;opacity:.85">勝負を申し込まれた！1on1で迎え撃て！</span>
        </div>`;
        // ボタンラベルを「先生に挑む」に変更
        resultBtn.textContent = '⚡ 先生に挑む！';
        resultBtn.style.background = 'linear-gradient(90deg,#ff8a3a,#ffd6a8)';
        resultBtn.style.color = '#3a1a0a';
      } else {
        _nextAction = null;
        resultBtn.textContent = 'もう一度戦う';
        resultBtn.style.background = 'linear-gradient(90deg,#ff5e5e,#ffaa00)';
        resultBtn.style.color = '#fff';
      }

      overlayTitle.textContent = bossDefeated ? '⚡ 撃破！⚡' : (youWon ? '🏆 勝利！🏆' : '😭 敗北…');
      overlaySub.innerHTML = (youWon
        ? `${alive[0].char.emoji} ${winnerName} が勝者だ！`
        : `${alive[0].char.emoji} ${winnerName} に倒された…`) + unlockMsg;

      selectArea.style.display = 'none';
      levelArea.style.display = 'none';
      modeSelectEl.style.display = 'none';
      startHint.style.display = 'none';
      backBtn.style.display = 'none';
      resultBtns.style.display = 'block';
      overlay.classList.remove('hide');
    }
  }
}

// resultBtn の挙動はバトル後の状況によって変わる（_nextActionに格納）
let _nextAction = null;
resultBtn.onclick = () => {
  if (_nextAction === 'bossFight') {
    startBossFight();
  } else {
    showModeSelect();
  }
};
homeBtn.onclick = () => {
  showModeSelect();
};

function startBossFight() {
  // プレイヤーのキャラはそのまま、CPUはClaudeCode先生1体のみで1on1
  overlay.classList.add('hide');
  gameState = 'playing';
  fighters = [];
  particles = [];
  hitMarks = [];

  fighters.push(createFighter(CHARS[playerIdx], 200, true));
  const cc = CHARS.find(c => c.id === 'claudecode');
  const boss = createFighter(cc, 700, false);
  boss.aiLevel = Math.min(9, selectedLevel + 2);
  boss.isBoss = true;
  fighters.push(boss);

  // 出現フラグ消費
  const e = getEncounter();
  e.shouldAppearClaudeCode = false;
  setEncounter(e);

  bossEntryTimer = 150; // 演出長め
  winnerName = '';
}

function update() {
  if (gameState !== 'playing') return;
  fighters.forEach(updateFighter);
  processHits();
  // パーティクル
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.25;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);
  hitMarks.forEach(h => h.life--);
  hitMarks = hitMarks.filter(h => h.life > 0);
  camShake = Math.max(0, camShake - 1.5);
  checkWinner();
  // キー押下フラグクリア
  keyPressed = {};
}

function render() {
  ctx.save();
  if (camShake > 0) {
    ctx.translate(
      (Math.random()-0.5) * camShake,
      (Math.random()-0.5) * camShake
    );
  }
  drawStage();
  // ファイター（プレイヤーを最後に描画して前面に）
  fighters.filter(f => !f.isPlayer).forEach(drawFighter);
  fighters.filter(f => f.isPlayer).forEach(drawFighter);
  drawHitMarks();
  drawParticles();
  ctx.restore();
  drawHUD();
  drawTrainingHUD();
  drawBossEntry();
}

function drawBossEntry() {
  if (bossEntryTimer <= 0) return;
  const t = bossEntryTimer / 120;
  const alpha = t < 0.2 ? (t/0.2) : t > 0.8 ? ((1-t)/0.2) : 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  // 暗幕
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, H/2 - 60, W, 120);
  // テキスト
  ctx.fillStyle = '#ff8a3a';
  ctx.font = 'bold 42px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('⚡ 隠しキャラ乱入！⚡', W/2, H/2 - 8);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px sans-serif';
  ctx.fillText('👨‍🏫 ClaudeCode先生', W/2, H/2 + 30);
  ctx.font = '14px sans-serif';
  ctx.fillStyle = '#ffd6a8';
  ctx.fillText('倒せば使えるようになるぞ…！', W/2, H/2 + 52);
  ctx.restore();
  bossEntryTimer--;
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}
showModeSelect();
loop();
</script>
